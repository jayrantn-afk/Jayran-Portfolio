<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jayran Studio | 後台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        body { background-color: #f3f4f6; font-family: -apple-system, sans-serif; }
        #login-overlay { position: fixed; inset: 0; background: #111827; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .sortable-ghost { opacity: 0.4; background-color: #e5e7eb; border: 2px dashed #3b82f6; }
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="h-screen overflow-hidden text-gray-800">

    <div id="login-overlay">
        <div class="text-4xl font-black mb-8 tracking-widest text-white uppercase">Jayran Admin</div>
        <input id="login-pwd" type="password" class="p-4 text-center text-black text-xl font-bold rounded-2xl w-80 mb-6 outline-none shadow-lg" placeholder="輸入後台密碼">
        <button id="btn-login" class="bg-blue-600 hover:bg-blue-500 text-white px-12 py-4 rounded-2xl font-bold text-xl shadow-lg transition">登入管理中心</button>
    </div>

    <div id="loader" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[9000] hidden flex-col justify-center items-center">
        <i class="fas fa-circle-notch fa-spin text-4xl text-blue-600 mb-4"></i>
        <div id="loader-text" class="text-lg font-bold text-gray-700 tracking-widest">資料處理中...</div>
    </div>

    <div class="flex h-full">
        <!-- 左側面板 -->
        <aside class="w-96 bg-white shadow-2xl flex flex-col z-10">
            <div class="p-6 bg-gray-900 text-white flex justify-between items-center">
                <h1 class="text-xl font-black tracking-widest uppercase">Admin Panel</h1>
                <a href="index.html" target="_blank" class="text-gray-400 hover:text-white text-sm" title="預覽前台"><i class="fas fa-external-link-alt"></i></a>
            </div>
            
            <div class="p-6 flex-1 overflow-y-auto">
                <h2 class="text-lg font-bold border-b pb-2 mb-6">新增作品</h2>
                <div class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">作品標題 <span class="text-red-500">*</span></label>
                        <input id="w-title" class="w-full bg-gray-50 border border-gray-200 p-3 rounded-lg font-bold focus:border-blue-500 outline-none transition" placeholder="輸入標題...">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">作品分類 <span class="text-red-500">*</span></label>
                        <div class="flex gap-2">
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="w-cat" value="video" class="peer sr-only" checked>
                                <div class="text-center p-3 border rounded-lg font-bold text-sm peer-checked:bg-blue-50 peer-checked:border-blue-500 peer-checked:text-blue-600 transition">🎬 影像</div>
                            </label>
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="w-cat" value="graphic" class="peer sr-only">
                                <div class="text-center p-3 border rounded-lg font-bold text-sm peer-checked:bg-purple-50 peer-checked:border-purple-500 peer-checked:text-purple-600 transition">🎨 圖文</div>
                            </label>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">上傳封面圖 <span class="text-red-500">*</span></label>
                        <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:bg-gray-50 transition relative">
                            <input type="file" id="w-file" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                            <i class="fas fa-cloud-upload-alt text-3xl text-gray-400 mb-2"></i>
                            <div id="file-name" class="text-sm font-bold text-gray-600">點擊或拖曳圖片至此</div>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">外部連結 (選填)</label>
                        <input id="w-link" class="w-full bg-gray-50 border border-gray-200 p-3 rounded-lg text-sm focus:border-blue-500 outline-none" placeholder="例如 YouTube 或 Behance 網址">
                    </div>
                    
                    <button id="btn-submit" class="w-full bg-gray-900 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-black hover:-translate-y-1 transition transform mt-4">
                        確認發佈
                    </button>
                </div>
            </div>
        </aside>

        <!-- 右側主畫面 -->
        <main class="flex-1 bg-gray-100 p-8 overflow-y-auto flex flex-col">
            <!-- 頂部分頁標籤 -->
            <div class="flex gap-4 mb-6 border-b border-gray-200 pb-2">
                <button class="font-bold text-blue-600 border-b-2 border-blue-600 px-3 pb-2 text-lg" onclick="switchView('video', this)">影像專案</button>
                <button class="font-bold text-gray-500 px-3 pb-2 text-lg hover:text-gray-800" onclick="switchView('graphic', this)">圖文專案</button>
                <button class="font-bold text-gray-500 px-3 pb-2 text-lg hover:text-gray-800" onclick="switchView('settings', this)"><i class="fas fa-cog mr-1"></i>網站前台設定</button>
            </div>

            <!-- 作品排序區塊 -->
            <div id="view-works" class="block">
                <div class="flex justify-between items-end mb-6">
                    <div>
                        <h2 class="text-2xl font-black mb-1">作品排序與預覽</h2>
                        <p class="text-sm text-gray-500 font-bold">按住圖片左側的「≡」拖曳，即可改變前台排版。越前面越有機會變成大網格。</p>
                    </div>
                    <button id="btn-save-order" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-bold shadow-md transition hidden">
                        <i class="fas fa-save mr-2"></i>儲存排序
                    </button>
                </div>
                <div id="sortable-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                    <!-- JS 動態生成 -->
                </div>
            </div>

            <!-- 網站設定區塊 -->
            <div id="view-settings" class="hidden">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 max-w-3xl">
                    <h2 class="text-2xl font-black mb-6 border-b pb-4">網站文字與外觀設定</h2>
                    
                    <div class="space-y-6">
                        <div class="bg-gray-50 p-6 rounded-xl border border-gray-100">
                            <h3 class="font-bold text-gray-800 mb-4"><i class="fas fa-heading mr-2 text-blue-500"></i>首頁大標題 (Hero Section)</h3>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs font-bold text-gray-500 mb-1">第一行 (粗體)</label>
                                    <input id="set-h1" class="w-full border p-3 rounded-lg font-bold" placeholder="Crafting Visual">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-gray-500 mb-1">第二行 (斜體藝術字)</label>
                                    <input id="set-h2" class="w-full border p-3 rounded-lg font-bold" placeholder="Masterpieces.">
                                </div>
                            </div>
                            <div class="mt-4">
                                <label class="block text-xs font-bold text-gray-500 mb-1">下方中文副標題</label>
                                <input id="set-sub" class="w-full border p-3 rounded-lg" placeholder="杰冉影像工作室 — 專注於高質感影音製作與商業圖文設計">
                            </div>
                        </div>

                        <div class="bg-gray-50 p-6 rounded-xl border border-gray-100">
                            <h3 class="font-bold text-gray-800 mb-4"><i class="fas fa-list mr-2 text-blue-500"></i>作品區標題</h3>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 mb-1">英文主標 (可使用 &lt;br&gt; 換行)</label>
                                <input id="set-sec-title" class="w-full border p-3 rounded-lg font-bold" placeholder="Selected<br>Works.">
                            </div>
                        </div>

                        <div class="bg-gray-50 p-6 rounded-xl border border-gray-100">
                            <h3 class="font-bold text-gray-800 mb-4"><i class="fas fa-envelope mr-2 text-blue-500"></i>頁尾聯絡資訊</h3>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs font-bold text-gray-500 mb-1">聯絡標語</label>
                                    <input id="set-contact-text" class="w-full border p-3 rounded-lg" placeholder="Ready to start your project?">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-gray-500 mb-1">聯絡信箱 (Email)</label>
                                    <input id="set-contact-email" class="w-full border p-3 rounded-lg font-bold" placeholder="hello@jayran.studio">
                                </div>
                            </div>
                        </div>

                        <button id="btn-save-settings-db" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition transform hover:-translate-y-1">
                            <i class="fas fa-save mr-2"></i>儲存並同步至前台
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, getDocs, getDoc, setDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCoNzrgrTgJONJZa4XgZn8K6fuwDqJBvLU",
            authDomain: "jayran-portfolio.firebaseapp.com",
            projectId: "jayran-portfolio",
            storageBucket: "jayran-portfolio.firebasestorage.app",
            messagingSenderId: "304873552635",
            appId: "1:304873552635:web:76a697004d834182924e5e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let allWorks = [];
        let currentView = 'video';
        let sortableInstance = null;

        // 登入
        document.getElementById('btn-login').addEventListener('click', () => {
            const pwd = document.getElementById('login-pwd').value;
            if(pwd === 'jayran2026') {
                document.getElementById('login-overlay').style.display = 'none';
                fetchData();
                fetchSettings();
            } else { alert('密碼錯誤'); }
        });

        // 顯示選擇的檔名
        document.getElementById('w-file').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name || "點擊或拖曳圖片至此";
            document.getElementById('file-name').innerText = fileName;
            document.getElementById('file-name').classList.add('text-blue-600');
        });

        async function fetchData() {
            const querySnapshot = await getDocs(collection(db, "jayran_works"));
            allWorks = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            allWorks.sort((a, b) => (a.order || 999) - (b.order || 999));
            renderList();
        }

        async function fetchSettings() {
            const docRef = doc(db, "jayran_settings", "frontend");
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                if(data.h1) document.getElementById('set-h1').value = data.h1;
                if(data.h2) document.getElementById('set-h2').value = data.h2;
                if(data.sub) document.getElementById('set-sub').value = data.sub;
                if(data.secTitle) document.getElementById('set-sec-title').value = data.secTitle;
                if(data.contactText) document.getElementById('set-contact-text').value = data.contactText;
                if(data.email) document.getElementById('set-contact-email').value = data.email;
            }
        }

        // 儲存網站設定
        document.getElementById('btn-save-settings-db').addEventListener('click', async () => {
            showLoader("儲存設定中...");
            const data = {
                h1: document.getElementById('set-h1').value || "Crafting Visual",
                h2: document.getElementById('set-h2').value || "Masterpieces.",
                sub: document.getElementById('set-sub').value || "杰冉影像工作室 — 專注於高質感影音製作與商業圖文設計",
                secTitle: document.getElementById('set-sec-title').value || "Selected<br>Works.",
                contactText: document.getElementById('set-contact-text').value || "Ready to start your project?",
                email: document.getElementById('set-contact-email').value || "hello@jayran.studio"
            };
            await setDoc(doc(db, "jayran_settings", "frontend"), data);
            hideLoader();
            alert("✅ 網站設定已更新！前台已同步。");
        });

        // 切換分類與面板
        window.switchView = function(type, btnEl) {
            currentView = type;
            const buttons = btnEl.parentElement.children;
            for(let btn of buttons) { btn.className = "font-bold text-gray-500 px-3 pb-2 text-lg hover:text-gray-800"; }
            btnEl.className = "font-bold text-blue-600 border-b-2 border-blue-600 px-3 pb-2 text-lg";
            
            if (type === 'settings') {
                document.getElementById('view-works').classList.add('hidden');
                document.getElementById('view-settings').classList.remove('hidden');
            } else {
                document.getElementById('view-settings').classList.add('hidden');
                document.getElementById('view-works').classList.remove('hidden');
                renderList();
            }
        };

        function renderList() {
            const container = document.getElementById('sortable-list');
            container.innerHTML = '';
            const filtered = allWorks.filter(w => w.category === currentView);
            
            if(filtered.length === 0) {
                container.innerHTML = '<div class="col-span-full py-10 text-center text-gray-400 font-bold">目前無作品，請從左側新增。</div>';
                return;
            }

            filtered.forEach((work, index) => {
                const badgeColor = work.category === 'video' ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700';
                const el = document.createElement('div');
                el.className = "bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden group relative";
                el.setAttribute('data-id', work.id);
                el.innerHTML = `
                    <div class="h-40 relative">
                        <img src="${work.imageUrl}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center gap-4">
                            <div class="drag-handle bg-white text-gray-800 w-10 h-10 rounded-full flex items-center justify-center shadow-lg hover:bg-gray-100 transition" title="拖曳排序"><i class="fas fa-bars"></i></div>
                            <div onclick="deleteWork('${work.id}')" class="cursor-pointer bg-red-500 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg hover:bg-red-600 transition" title="刪除"><i class="fas fa-trash"></i></div>
                        </div>
                    </div>
                    <div class="p-4">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[10px] font-bold px-2 py-0.5 rounded ${badgeColor} uppercase tracking-wider">${work.category}</span>
                            <span class="text-xs text-gray-400 font-mono">#${index + 1}</span>
                        </div>
                        <h3 class="font-bold text-gray-800 truncate">${work.title}</h3>
                    </div>
                `;
                container.appendChild(el);
            });

            if(sortableInstance) sortableInstance.destroy();
            sortableInstance = new Sortable(container, {
                handle: '.drag-handle', animation: 200, ghostClass: 'sortable-ghost',
                onEnd: function () { document.getElementById('btn-save-order').classList.remove('hidden'); }
            });
        }

        // 儲存排序
        document.getElementById('btn-save-order').addEventListener('click', async () => {
            const btn = document.getElementById('btn-save-order');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>儲存中...'; btn.disabled = true;

            const items = document.querySelectorAll('#sortable-list > div');
            const batch = writeBatch(db);
            
            items.forEach((item, index) => {
                const id = item.getAttribute('data-id');
                batch.update(doc(db, "jayran_works", id), { order: index });
                const work = allWorks.find(w => w.id === id);
                if(work) work.order = index;
            });

            await batch.commit();
            allWorks.sort((a, b) => (a.order || 999) - (b.order || 999));
            
            btn.innerHTML = '<i class="fas fa-check mr-2"></i>已儲存';
            setTimeout(() => { btn.classList.add('hidden'); btn.innerHTML = '<i class="fas fa-save mr-2"></i>儲存排序'; btn.disabled = false; }, 2000);
            renderList();
        });

        window.deleteWork = async function(id) {
            if(!confirm('確定要刪除這份作品嗎？')) return;
            showLoader("刪除中...");
            await deleteDoc(doc(db, "jayran_works", id));
            allWorks = allWorks.filter(w => w.id !== id);
            hideLoader(); renderList();
        };

        // 發佈新作品 (含防呆除錯與 Timeout)
        document.getElementById('btn-submit').addEventListener('click', async () => {
            const title = document.getElementById('w-title').value.trim();
            const category = document.querySelector('input[name="w-cat"]:checked').value;
            const fileInput = document.getElementById('w-file');
            const link = document.getElementById('w-link').value.trim();

            if (!title) return alert("請輸入標題");
            if (fileInput.files.length === 0) return alert("請上傳一張圖片");

            const file = fileInput.files[0];
            
            // 防呆：檔案大於 5MB 警告
            if(file.size > 5 * 1024 * 1024) {
                if(!confirm("這張圖片超過 5MB，上傳可能會需要比較久的時間，確定要繼續嗎？")) return;
            }

            showLoader("上傳圖檔中，請稍候...");

            try {
                const safeName = Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9.]/g, '');
                const storageRef = ref(storage, 'portfolio_images/' + safeName);
                
                // 加入 Promise.race 避免無限卡住跑圈圈
                const uploadTask = uploadBytes(storageRef, file);
                const timeoutTask = new Promise((_, reject) => setTimeout(() => reject(new Error("TIMEOUT")), 15000));
                
                await Promise.race([uploadTask, timeoutTask]);
                const downloadURL = await getDownloadURL(storageRef);

                const catWorks = allWorks.filter(w => w.category === category);
                const maxOrder = catWorks.length > 0 ? Math.max(...catWorks.map(w => w.order || 0)) : -1;

                const newDocData = { title: title, category: category, imageUrl: downloadURL, link: link, order: maxOrder + 1, createdAt: Date.now() };
                const docRef = await addDoc(collection(db, "jayran_works"), newDocData);
                
                allWorks.push({ id: docRef.id, ...newDocData });
                
                document.getElementById('w-title').value = '';
                document.getElementById('w-link').value = '';
                fileInput.value = '';
                document.getElementById('file-name').innerText = "點擊或拖曳圖片至此";
                document.getElementById('file-name').classList.remove('text-blue-600');
                
                document.querySelector(`button[onclick="switchView('${category}', this)"]`).click();
                
            } catch (error) {
                console.error("Upload Error:", error);
                if(error.message === "TIMEOUT") {
                    alert("⛔ 上傳超時！\n這通常是因為 Firebase Storage 的安全規則沒有開啟。\n請至 Firebase > Storage > Rules，將規則改為 allow read, write: if true;");
                } else {
                    alert("⛔ 上傳失敗！\n錯誤原因：" + error.message + "\n請確認 Firebase 權限是否正確設定。");
                }
            } finally {
                hideLoader();
            }
        });

        function showLoader(text) { document.getElementById('loader-text').innerText = text; document.getElementById('loader').style.display = 'flex'; }
        function hideLoader() { document.getElementById('loader').style.display = 'none'; }

    </script>
</body>
</html>
