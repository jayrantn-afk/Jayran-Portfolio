<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAYRAN STUDIO | 杰冉影像</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,600;0,800;1,400&family=Noto+Serif+TC:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* 基礎色彩與字體設定，保持最高質感 */
        :root { --bg-color: #050505; --text-main: #f5f5f5; --text-muted: #888888; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        h1, h2, h3, .serif-tc { font-family: 'Playfair Display', 'Noto Serif TC', serif; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }

        .custom-cursor { width: 20px; height: 20px; border: 1px solid rgba(255,255,255,0.5); border-radius: 50%; position: fixed; pointer-events: none; z-index: 99999; transition: transform 0.2s ease, background-color 0.2s ease; transform: translate(-50%, -50%); mix-blend-mode: difference; }

        /* 視差與淡入動畫 */
        .fade-up { opacity: 0; transform: translateY(40px); transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .fade-up.in-view { opacity: 1; transform: translateY(0); }

        /* 網格圖片 Hover 特效 */
        .portfolio-item { overflow: hidden; position: relative; cursor: pointer; background-color: #111; }
        .portfolio-img { transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); filter: brightness(0.7) grayscale(0.3); }
        .portfolio-item:hover .portfolio-img { transform: scale(1.05); filter: brightness(1) grayscale(0); }
        .portfolio-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 60%); opacity: 0; transition: opacity 0.5s ease; display: flex; flex-direction: column; justify-content: flex-end; padding: 2.5rem; }
        .portfolio-item:hover .portfolio-overlay { opacity: 1; }

        .filter-btn { position: relative; color: var(--text-muted); transition: color 0.3s ease; padding-bottom: 4px; }
        .filter-btn::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 1px; background-color: var(--text-main); transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .filter-btn:hover, .filter-btn.active { color: var(--text-main); }
        .filter-btn:hover::after, .filter-btn.active::after { width: 100%; }

        .hero-gradient { background: radial-gradient(circle at center, transparent 0%, #050505 100%); }
        @keyframes scrollDown { 0% { transform: translateY(-100%); } 50% { transform: translateY(100%); } 100% { transform: translateY(100%); } }
    </style>
</head>
<body class="antialiased selection:bg-gray-700 selection:text-white">

    <div class="custom-cursor hidden md:block" id="cursor"></div>

    <div id="global-loader" class="fixed inset-0 bg-[#050505] z-[100000] flex flex-col justify-center items-center transition-opacity duration-700">
        <div class="text-3xl tracking-[0.3em] font-light uppercase animate-pulse">Jayran <span class="font-bold">Studio</span></div>
    </div>

    <!-- 導航列 -->
    <nav class="fixed w-full z-50 mix-blend-difference px-6 py-8 md:px-12 flex justify-between items-center">
        <div class="text-xl md:text-2xl font-bold tracking-[0.2em] uppercase cursor-pointer" onclick="window.scrollTo(0,0)">
            Jayran <span class="text-gray-400 font-light">Studio</span>
        </div>
        <div class="hidden md:flex gap-8 text-sm tracking-widest uppercase font-light">
            <a href="#work" class="hover:text-gray-400 transition-colors">Works</a>
        </div>
    </nav>

    <!-- 首頁視覺 -->
    <header class="relative h-screen flex flex-col justify-center items-center text-center px-4">
        <div class="absolute inset-0 z-[-1]">
            <!-- 預設背景圖，未來可在這替換成工作室的旗艦大圖 -->
            <img src="https://images.unsplash.com/photo-1600607686527-6fb886090705?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80" alt="Background" class="w-full h-full object-cover opacity-30">
            <div class="absolute inset-0 hero-gradient"></div>
        </div>
        <h1 class="fade-up text-5xl md:text-8xl lg:text-9xl font-semibold tracking-tighter mb-6 serif-tc leading-tight">
            Crafting Visual <br> <span class="italic font-light text-gray-300">Masterpieces.</span>
        </h1>
        <p class="fade-up text-sm md:text-lg tracking-[0.3em] text-gray-400 uppercase max-w-2xl mt-4" style="transition-delay: 0.2s;">
            杰冉影像工作室 — 專注於高質感影音製作與商業圖文設計
        </p>
        <div class="absolute bottom-10 left-1/2 transform -translate-x-1/2 fade-up" style="transition-delay: 0.4s;">
            <a href="#work" class="flex flex-col items-center text-gray-500 hover:text-white transition-colors duration-300">
                <span class="text-xs tracking-widest uppercase mb-2">Scroll</span>
                <div class="w-[1px] h-12 bg-gray-600 relative overflow-hidden"><div class="absolute top-0 left-0 w-full h-full bg-white transform -translate-y-full animate-[scrollDown_2s_infinite]"></div></div>
            </a>
        </div>
    </header>

    <!-- 作品區 -->
    <section id="work" class="py-24 md:py-32 px-6 md:px-12 max-w-[1600px] mx-auto min-h-screen">
        <div class="flex flex-col md:flex-row justify-between items-end mb-16 fade-up">
            <h2 class="text-4xl md:text-6xl serif-tc mb-8 md:mb-0">Selected <br>Works.</h2>
            <div class="flex gap-6 md:gap-8 text-xs md:text-sm tracking-widest uppercase font-light">
                <button class="filter-btn active" onclick="filterWorks('all')">All</button>
                <button class="filter-btn" onclick="filterWorks('video')">Video (影像)</button>
                <button class="filter-btn" onclick="filterWorks('graphic')">Graphic (圖文)</button>
            </div>
        </div>
        
        <!-- 自動生成網格 -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-6 md:gap-10" id="portfolio-grid"></div>
        
        <!-- 尚未上傳提示 -->
        <div id="empty-state" class="hidden text-center py-20 text-gray-600 tracking-widest uppercase fade-up">目前尚無作品，請前往後台新增。</div>
    </section>

    <footer class="border-t border-gray-900 py-16 px-6 md:px-12 mt-10">
        <div class="max-w-[1600px] mx-auto flex flex-col md:flex-row justify-between items-center text-xs text-gray-600 tracking-widest uppercase">
            <div>&copy; 2026 JAYRAN STUDIO. All rights reserved. 
                <!-- 指向專屬後台的連結 -->
                <a href="admin.html" class="ml-2 hover:text-white transition" title="進入管理中心"><i class="fas fa-lock"></i></a>
            </div>
        </div>
    </footer>

    <!-- Firebase 邏輯 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCoNzrgrTgJONJZa4XgZn8K6fuwDqJBvLU",
            authDomain: "jayran-portfolio.firebaseapp.com",
            projectId: "jayran-portfolio",
            storageBucket: "jayran-portfolio.firebasestorage.app",
            messagingSenderId: "304873552635",
            appId: "1:304873552635:web:76a697004d834182924e5e",
            measurementId: "G-V8FQJ01VS2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let allWorks = [];
        let currentFilter = 'all';

        onSnapshot(collection(db, "jayran_works"), (snapshot) => {
            allWorks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            // 關鍵：依據後台拼圖設定的 `order` 來做排版順序！
            allWorks.sort((a, b) => (a.order || 999) - (b.order || 999));
            
            renderPortfolio();

            const loader = document.getElementById('global-loader');
            if(loader) { loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 700); }
        });

        window.filterWorks = function(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            renderPortfolio();
        };

        function renderPortfolio() {
            const grid = document.getElementById('portfolio-grid');
            const emptyState = document.getElementById('empty-state');
            grid.innerHTML = '';

            const filteredWorks = currentFilter === 'all' ? allWorks : allWorks.filter(w => w.category === currentFilter);
            if (filteredWorks.length === 0) { emptyState.classList.remove('hidden'); } else { emptyState.classList.add('hidden'); }

            filteredWorks.forEach((work, index) => {
                // 自動非對稱排版：依據後台排序的位置，自動決定哪張是大圖、哪張是小圖
                let colSpan = 'col-span-1 md:col-span-6';
                let heightClass = 'h-[50vh] md:h-[60vh]';

                if (index % 4 === 0) { colSpan = 'col-span-1 md:col-span-8'; heightClass = 'h-[50vh] md:h-[70vh]'; }
                else if (index % 4 === 1) { colSpan = 'col-span-1 md:col-span-4'; heightClass = 'h-[50vh] md:h-[70vh]'; }
                else if (index % 4 === 2) { colSpan = 'col-span-1 md:col-span-4'; heightClass = 'h-[50vh] md:h-[60vh]'; }
                else if (index % 4 === 3) { colSpan = 'col-span-1 md:col-span-8'; heightClass = 'h-[50vh] md:h-[60vh]'; }

                const categoryLabel = work.category === 'video' ? 'Cinematography' : 'Graphic Design';
                const clickAction = work.link ? `onclick="window.open('${work.link}', '_blank')"` : '';

                const itemHTML = `
                    <div class="portfolio-item ${colSpan} ${heightClass} fade-up in-view" ${clickAction} style="animation: fadeIn 0.8s ease forwards;">
                        <img src="${work.imageUrl}" alt="${work.title}" class="w-full h-full object-cover portfolio-img">
                        <div class="portfolio-overlay">
                            <p class="text-xs tracking-widest text-gray-300 mb-2 uppercase">${categoryLabel}</p>
                            <h3 class="text-2xl md:text-3xl lg:text-4xl serif-tc">${work.title}</h3>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', itemHTML);
            });
        }

        /* UI 游標與動畫 */
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });
        document.addEventListener('mouseover', (e) => {
            if (e.target.closest('a') || e.target.closest('button') || e.target.closest('.portfolio-item')) { cursor.style.transform = 'translate(-50%, -50%) scale(1.5)'; cursor.style.backgroundColor = 'rgba(255,255,255,0.1)'; } 
            else { cursor.style.transform = 'translate(-50%, -50%) scale(1)'; cursor.style.backgroundColor = 'transparent'; }
        });
        const observer = new IntersectionObserver((entries, obs) => { entries.forEach(e => { if(e.isIntersecting) { e.target.classList.add('in-view'); obs.unobserve(e.target); } }); }, { threshold: 0.1 });
        const observeElements = () => { document.querySelectorAll('.fade-up:not(.in-view)').forEach(el => observer.observe(el)); };
        new MutationObserver(observeElements).observe(document.getElementById('portfolio-grid'), { childList: true });
        setTimeout(observeElements, 500);
    </script>
</body>
</html>
